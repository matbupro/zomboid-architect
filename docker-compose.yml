# =============================================================================
# docker-compose.yml — Orchestration du projet Zomboid_Architect
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Bot Discord — interface conversationnelle
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: zomboid-bot
    restart: unless-stopped
    volumes:
      - "./bot:/app/bot:ro"                                                              # bot package (preserve python -m bot.main)
      - "F:/Antigravity DEV/Zomboid_Architect/.env.unified:/app/.env.unified:ro"        # config unifiée
      - "./src:/app/src:ro"                                                              # modules src pour imports Python (governance, retrieval)
      - "logs-data:/app/logs"                                                              # logs writes (writable volume)
    environment:
      DISCORD_TOKEN: "${DISCORD_TOKEN}"            # depuis .env du host ou variables d'environnement
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_HOST: http://host.docker.internal:8000
      WORKSPACE_CHANNEL_NAME: "💻 WORKSPACE Z-ARCHITECT"
    networks:
      - zomboid-net
    depends_on: []  # pas de dépendance interne, tout est externe

  # ---------------------------------------------------------------------------
  # Ollama — LLM local (optionnel, décommenter si tu veux Ollama dans Docker)
  # Pour Windows : préfère Ollama installé sur la machine hôte + host.docker.internal
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: zomboid-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - zomboid-net
    # Pull du modèle au démarrage :
    command: >
      sh -c "
        ollama pull llama3.2 &&
        ollama pull nomic-embed-text &&
        exec ollama serve
      "

  # ---------------------------------------------------------------------------
  # ChromaDB — base vectorielle du knowledge engine
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: zomboid-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_ALLOW_SIGNUP=true
    networks:
      - zomboid-net

  # ---------------------------------------------------------------------------
  # Ingestor — moteur d'ingestion multi-format (PDF, images, vidéo, audio, web)
  # ---------------------------------------------------------------------------
  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: zomboid-ingestor
    restart: "no"          # lancé à la demande via `docker compose run`
    volumes:
      - "F:/Antigravity DEV/Zomboid_Architect/data:/app/zomboid_data:rw"
      # .env.unifié monté à la racine du container (/app/)
      - "F:/Antigravity DEV/Zomboid_Architect/.env.unified:/app/.env.unified:ro"
      # Repo complet — donne accès au module src/ (governance, logger, retrieval)
      - "F:/Antigravity DEV/Zomboid_Architect/src:/app/src:ro"
      # Dossier tests pour golden set (report)
      - "F:/Antigravity DEV/Zomboid_Architect/tests:/app/tests:ro"
      # Reports générés par le rapport (rw dans le container, visibles dans repo)
      - "reports-data:/app/reports:rw"
      # Logs du conteneur → dossier local (rw)
      - "logs-data:/app/logs:rw"
    environment:
      CHROMA_HOST: http://host.docker.internal:8000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      EMBEDDING_MODEL: "nomic-embed-text"
      CLAUDE_API_KEY: ""       # optionnel : mettre la clé Claude pour vision API
      STEAM_USER: "${STEAM_USER}"
      STEAM_PASS: "${STEAM_PASS}"
      PYTHONPATH: "/app:/app/src"  # permet import src.governance.* + ingestor packages
    networks:
      - zomboid-net
    depends_on: [chromadb]
    deploy:
      resources:
        limits:
          memory: 4G

# ---------------------------------------------------------------------------
# Volumes persistants
# ---------------------------------------------------------------------------
volumes:
  ollama-data:
  chroma-data:
  logs-data:    # logs ingestor/ bot (rw depuis le container)
  reports-data: # golden_report JSON/MD générés (rw)

# ---------------------------------------------------------------------------
# Network (bridge par défaut)
# ---------------------------------------------------------------------------
networks:
  zomboid-net:
    driver: bridge
