name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Lint (S8-d) : s'exécute en premier, très rapide ──────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: |
          ruff check ingestor/ tests/ --output-format=github

      - name: Import sort check (isort-compatible via ruff)
        run: ruff check --select I ingestor/ tests/ || true

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio hypothesis pytest-cov py7zr
          # Ingestor core deps (minimal pour les tests)
          pip install -e ingestor/ 2>/dev/null || true

      - name: Run tests (unit + integration mocks)
        run: |
          pytest -m "not e2e and not slow" \
            --cov=ingestor/steam --cov=ingestor/processors/pbo.py \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Run modgen integration tests
        run: |
          pip install jinja2
          pytest tests/test_modgen_integration.py -m "" -v

      - name: Run golden set recall tests
        run: |
          python tests/test_golden_set.py -v

      - name: Run regression tests (golden set comparison)
        run: |
          pytest tests/test_regression.py -m "" -v --tb=short

      - name: Run property-based tests (hypothesis)
        run: |
          pytest tests/test_workshop_scanner.py -m "" -k addoninfo --hypothesis-seed=42 -v

      # ── S8-e : Installation luacheck (ubuntu uniquement, pour L1 complet) ──
      - name: Install luacheck (ubuntu only for L1 lua syntax check)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          sudo apt-get update && sudo apt-get install -y luarocks
          luarocks install luacheck

      # ── S8-e : Run validation levels 1-4 sur fake test mod (chaque PR) ──
      - name: Run S8-e validation levels L1-L4 (fake test mod)
        run: |
          pytest tests/test_validation_levels.py -v --tb=short

      # ── S8-e : Verify lua syntaxe du test mod passe luacheck (ubuntu only) ──
      - name: Verify fake mod Lua syntax via luacheck (ubuntu only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          # Le fake mod doit passer luacheck sans erreur (c'est la condition de S8-e)
          luacheck tests/fixtures/test_mod_zombo_small/media/lua/ZomboSmallInit.lua
          luacheck tests/fixtures/test_mod_zombo_small/media/scripts/ZomboSmallConfig.lua

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Gate CI : bloquer ecriture directe en production/ ---
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessaire pour le diff complet

      - name: Check no direct writes to production/
        run: |
          # Pour un push, comparer HEAD^ → HEAD. Pour PR, base → head.
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          else
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          fi

          # Lister les fichiers modifies dans production/ (exclure .gitkeep)
          PROD_FILES=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null \
            | grep "^data/production/" | grep -v "\.gitkeep$" || true)

          if [ -z "$PROD_FILES" ]; then
            echo "OK: aucun fichier production/ modifie"
            exit 0
          fi

          # Verifier si promote.py ou tag_release.py ont ete modifies aussi
          PROMOTE_CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null \
            | grep -E "^ingestor/(promote|tag_release)\.py$" || true)

          if [ -n "$PROMOTE_CHANGED" ]; then
            echo "OK: production/ modifie accompagne de promote.py/tag_release.py"
            exit 0
          fi

          # Sinon — bloquer !
          echo "::error::Ecriture directe en production/ detectée : ${PROD_FILES}"
          echo "Seul promote.py ou tag_release.py peuvent modifier production/."
          echo "Utilisez : python -m ingestor.promote"
          exit 1

      - name: Verify production_guard integrity
        run: |
          # Verifier que le guard existe et contient les auteurs autorises
          GUARD="src/governance/production_guard.py"
          if ! grep -q "AUTHORIZED_WRITERS.*promote" "$GUARD"; then
            echo "::error::production_guard.py ne refere pas promote dans AUTHORIZED_WRITERS"
            exit 1
          fi
          echo "OK: production_guard.py intact"

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'  # lancé manuellement uniquement

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run E2E tests (requires network)
        run: |
          pip install pytest pytest-asyncio
          pytest -m e2e -v

